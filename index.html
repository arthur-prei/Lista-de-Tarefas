<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jersey+20&family=Orbitron:wght@400..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap');
        * {
            font-family: "Jersey 20", sans-serif;
        }
        /* barra de rolagem */
        ul::-webkit-scrollbar {
            width: 6px;
        }
        /* trilho da barra de rolagem */
        ul::-webkit-scrollbar-track {
            background-color: brown;
            border-radius: 5px;
        } 
        /* indicador da barra de rolagem  */
        ul::-webkit-scrollbar-thumb {
            background-color: yellow;
            border-radius: 20px;
            border: 3px solid orange;
        }
    </style>
</head>
<body class="bg-yellow-950 text-white h-screen flex flex-col">

    <header class="p-5 text-center bg-yellow-700 rounded-lg">
        <h1 class="sm:text-6xl text-4xl">Seja bem-vindo(a)!</h1>
        <p class="sm:text-2xl text-xl text-yellow-200"> <i class="fa-solid fa-book-open"></i> lista de tarefas</p>
    </header>
    
    <main class="flex-1 p-1 min-h-0 grid lg:grid-cols-2 gap-1">
        <section class="flex flex-col p-2 bg-yellow-50 border-4 rounded-sm border-yellow-800 overflow-hidden">
            <div class="flex gap-1 h-15">
                <input id="task" class="text-2xl flex-1 pl-1 text-black bg-yellow-100 rounded-lg border border-yellow-300" type="text" placeholder="adicione uma tarefa aqui">

                <!-- prioridade da tarefa -->
                <div class="flex flex-col">
                    <p class="text-yellow-800 text-end hidden xl:block">
                        <span class="text-blue-300">✦baixa</span>
                        <span class="text-yellow-400">✦✦média</span>
                        <span class="text-red-400">✦✦✦alta</span>
                    </p>
                    <select name="priority" class="text-white flex-1 text-2xl bg-yellow-600 rounded">
                        <option value="✦">✦baixa</option>
                        <option value="✦✦">✦✦média</option>
                        <option value="✦✦✦">✦✦✦alta</option>
                    </select>
                </div>

                <button type="button" id="add-task" class="w-30 text-white text-lg bg-yellow-600 hover:bg-yellow-700 rounded cursor-pointer"><i class="fa-solid fa-feather"></i> adicionar</button>
            </div>
            <p class="text-yellow-700 text-end block xl:hidden">
                <span class="text-blue-300">✦baixa</span>
                <span class="text-yellow-400">✦✦média</span>
                <span class="text-red-400">✦✦✦alta</span> ←prioridade
            </p>
            
            <h2 class="sm:text-2xl text-xl mt-2 text-yellow-950 text-center bg-yellow-200 rounded-lg">Tarefas pendentes <span id="to-do" class="bg-yellow-500 text-white px-2 m-1 rounded-xl">0</span></h2>
            
            <ul class="flex-1 flex flex-col min-h-0 overflow-y-auto text-yellow-800 gap-1 mt-1" id="list">
                <!-- Aqui serão adicionadas as tarefas a serem concluidas -->
            </ul>
        </section>

        <section class="flex flex-col p-2 gap-1 bg-yellow-900 border-4 rounded-sm border-yellow-800 overflow-hidden">
            
            <h2 class="text-center text-2xl bg-yellow-700 rounded-lg">Log de tarefas</h2>
            
            <!-- Contadores -->
            <div class="flex justify-between">
                <p>Tarefas concluídas: <span id="completed-tasks" class="text-emerald-300 text-xl">0</span></p>
                <p>Tarefas canceladas: <span id="canceled-tasks" class="text-red-300 text-xl">0</span></p>
            </div>

            <ul class="flex-1 flex flex-col min-h-0 overflow-y-auto mt-1 gap-1" id="completed-list">
                <!-- Aqui serão adicionadas as tarefas que foram concluídas -->
            </ul>
        </section>
    </main>
    
    <script src="script.js"></script>
</body>
</html>
